---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-auth
  template:
    metadata:
      labels:
        app: backend-auth
    spec:
      containers:
        - name: backend-auth
          image: donaemeka/auth:latest
          ports:
            - containerPort: 3001
          env:
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: SECRET
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MONGODB_URI
            - name: CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CLOUD_NAME
            - name: CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CLOUD_API_KEY
            - name: CLOUD_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CLOUD_API_SECRET
                  
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: backend-auth
  ports:
    - port: 3001
      targetPort: 3001
